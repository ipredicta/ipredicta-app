<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<title>Privacy Policy — iPredicta</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:         #f7f9fc;
  --surface:    #ffffff;
  --navy:       #0d1b3e;
  --blue:       #2979e8;
  --blue-light: #4fb3f6;
  --text:       #0d1b3e;
  --text-mid:   #475569;
  --text-light: #64748b;
  --border:     #e2e8f4;
  --radius:     14px;
}
html, body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 15px; line-height: 1.6;
  min-height: 100%; -webkit-font-smoothing: antialiased;
}
body { display: flex; flex-direction: column; min-height: 100vh; }
h1, h2 { font-family: 'Syne', sans-serif; letter-spacing: -.02em; color: var(--navy); }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

.site-header {
  background: #080d1a;
  padding: 18px 24px;
  border-bottom: 1px solid rgba(255,255,255,.07);
}
.site-header img { display: block; max-height: 28px; width: auto; }

.content-shell {
  flex: 1;
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
  padding: 56px 24px 80px;
}
.content-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 48px 40px;
  box-shadow: 0 1px 4px rgba(13,27,62,.06);
}
.page-eyebrow {
  font-size: .72rem; font-weight: 700; color: var(--blue);
  text-transform: uppercase; letter-spacing: .12em; margin-bottom: 12px;
}
h1.page-title { font-size: 2rem; font-weight: 800; margin-bottom: 18px; }
.page-body p { color: var(--text-mid); margin-bottom: 14px; }
.page-body a { color: var(--blue); font-weight: 600; }
.page-back {
  display: inline-block; margin-top: 28px;
  font-size: .85rem; color: var(--text-light); font-weight: 600;
}
.page-back:hover { color: var(--blue); text-decoration: none; }

.site-footer {
  border-top: 1px solid var(--border);
  padding: 22px 24px;
  text-align: center; font-size: .8rem; color: var(--text-light);
}

@media (max-width: 600px) {
  .content-card { padding: 32px 24px; }
  h1.page-title { font-size: 1.5rem; }
}
</style>
</head>
<body>

<header class="site-header">
  <a href="https://ipredicta.co">
    <img src="/assets/logo-horizontal.svg" alt="iPredicta">
  </a>
</header>

<main class="content-shell">
  <div class="content-card">
    <div class="page-eyebrow">Legal</div>
    <h1 class="page-title">Privacy Policy</h1>
    <div class="page-body">
      <p>We're finalising our policies. For questions, please contact <a href="mailto:hello@ipredicta.co">hello@ipredicta.co</a>.</p>
    </div>
    <a class="page-back" href="https://ipredicta.co">← Back to iPredicta</a>
  </div>
</main>

<footer class="site-footer">
  &copy; <script>document.write(new Date().getFullYear())</script> iPredicta. All rights reserved.
</footer>

</body>
</html>
